name: Deploy Rekognition Pipeline

on:
  push:
    branches: [ main ]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: us-east-1

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "1.7.0"

      - name: Terraform Init
        run: terraform init

      # Step 1: Bootstrap the ECR Repository
      - name: Terraform Target ECR
        run: terraform apply -target=aws_ecr_repository.rekognition_repo -auto-approve

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      # Step 2: Build and Push Docker Image
      - name: Build and Push Docker Image
        env:
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
          ECR_REPOSITORY: group3-rekognition-repo
          IMAGE_TAG: latest
        run: |
          docker build --platform linux/amd64 -t $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG .
          docker push $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG

      # Step 3: Deploy the rest of the Cloud Infrastructure
      - name: Terraform Apply Full
        run: terraform apply -auto-approve

      # Step 4: Automate Frontend - URL Injection & S3 Sync
      - name: Inject API URL and Deploy to S3
        run: |
          # Capture the new API URL from Terraform output
          REAL_URL=$(terraform output -raw api_endpoint)
          
          # Inject the URL into script.js (Assumes your files are in the root or a 'frontend' folder)
          # We use 'sed' to swap the placeholder for the real live URL
          sed -i "s|REPLACE_ME_API_URL|$REAL_URL|g" script.js
          
          # Get the dynamically generated bucket name
          BUCKET_NAME=$(terraform output -raw website_bucket_name)
          
          # Upload all frontend files (index.html, script.js, style.css) to S3
          # Using --delete ensures old files are removed
          aws s3 sync . s3://$BUCKET_NAME --exclude "*" --include "index.html" --include "script.js" --include "style.css" --delete

# Step 4: Automate Frontend - URL Injection & S3 Sync
      - name: Inject API URL and Deploy to S3
        run: |
          # 1. Capture the new API URL from Terraform output
          REAL_URL=$(terraform output -raw api_endpoint)
          
          # 2. Inject the URL into script.js inside the 'website' folder
          # This swaps 'REPLACE_ME_API_URL' for the actual live endpoint
          sed -i "s|REPLACE_ME_API_URL|$REAL_URL|g" website/script.js
          
          # 3. Get the dynamically generated bucket name
          BUCKET_NAME=$(terraform output -raw website_bucket_name)
          
          # 4. Upload the contents of the 'website' folder to S3
          # We sync from './website' so the files land in the root of the bucket
          aws s3 sync ./website s3://$BUCKET_NAME --delete