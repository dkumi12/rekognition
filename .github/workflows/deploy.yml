# 1. Initialize Terraform
      - name: Terraform Init
        run: terraform init

      # 2. BOOTSTRAP: Only create the ECR repository first
      - name: Terraform Target ECR
        run: terraform apply -target=aws_ecr_repository.rekognition_repo -auto-approve

      # 3. Login to ECR (Now that it exists)
      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      # 4. Build and Push (The warehouse is ready!)
      - name: Build, Tag, and Push Image
        env:
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
          ECR_REPOSITORY: group3-rekognition-repo
          IMAGE_TAG: latest
        run: |
          docker build --platform linux/amd64 -t $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG .
          docker push $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG

      # 5. COMPLETE: Apply everything else (S3, Lambda, API)
      - name: Terraform Apply Full
        run: terraform apply -auto-approve