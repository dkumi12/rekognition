<!DOCTYPE html>
<html class="light" lang="en">
<head>
    <meta charset="utf-8"/>
    <meta content="width=device-width, initial-scale=1.0" name="viewport"/>
    <link href="https://fonts.googleapis.com/css2?family=Public+Sans:wght@300;400;500;600;700;900&display=swap" rel="stylesheet"/>
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet"/>
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary": "#3b82f6",
                        "background-light": "#f8fafc",
                        "background-dark": "#0f172a",
                    },
                    fontFamily: {
                        "display": ["Public Sans", "sans-serif"]
                    },
                    borderRadius: {
                        "DEFAULT": "0.25rem",
                        "lg": "0.5rem",
                        "xl": "0.75rem",
                        "full": "9999px"
                    },
                },
            },
        }
    </script>
    <title>Group 3: AI Annotation Workspace</title>
    <style type="text/tailwindcss">
        .custom-scrollbar::-webkit-scrollbar { width: 4px; }
        .custom-scrollbar::-webkit-scrollbar-track { background: transparent; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: #e2e8f0; border-radius: 10px; }
        .dark .custom-scrollbar::-webkit-scrollbar-thumb { background: #334155; }
    </style>
</head>
<body class="bg-background-light dark:bg-background-dark font-display text-slate-900 dark:text-slate-100 min-h-screen flex flex-col lg:flex-row">
    <input type="file" id="imageInput" class="hidden" accept="image/*">

    <aside class="hidden lg:flex w-64 flex-shrink-0 border-r border-slate-200 dark:border-slate-800 bg-white dark:bg-slate-900 flex-col justify-between transition-all h-screen">
        <div class="flex flex-col gap-6 p-6">
            <div class="flex items-center gap-3">
                <div class="h-10 w-10 rounded-xl bg-primary flex items-center justify-center text-white shrink-0">
                    <span class="material-symbols-outlined">analytics</span>
                </div>
                <div class="flex flex-col">
                    <h1 class="text-base font-bold leading-tight">Group 3</h1>
                    <p class="text-primary text-xs font-semibold uppercase tracking-wider">AI Analyzer</p>
                </div>
            </div>
            <nav class="flex flex-col gap-1">
                <a class="flex items-center gap-3 px-3 py-2.5 rounded-xl bg-primary/10 text-primary font-semibold" href="#">
                    <span class="material-symbols-outlined text-[22px]">dashboard</span>
                    <span class="text-sm">Workspace</span>
                </a>
            </nav>
        </div>
    </aside>

    <main class="flex-1 flex flex-col h-screen overflow-hidden relative">
        
        <header class="h-16 border-b border-slate-200 dark:border-slate-800 bg-white/80 dark:bg-slate-900/80 backdrop-blur-md flex items-center justify-between px-4 lg:px-8 z-20 shrink-0">
            <div class="flex items-center gap-2 lg:hidden">
                <div class="h-8 w-8 rounded-lg bg-primary flex items-center justify-center text-white shrink-0">
                    <span class="material-symbols-outlined text-sm">analytics</span>
                </div>
                <h1 class="font-bold text-sm truncate max-w-[120px]">AI Analyzer</h1>
            </div>
            <div class="hidden lg:flex items-center gap-2">
                <span class="text-slate-400 font-medium">Workspace</span>
                <span class="text-slate-300">/</span>
                <span class="font-semibold">Interactive Mode</span>
            </div>
            
            <div class="flex items-center gap-4">
                <span id="statusBadge" class="hidden bg-green-100 text-green-700 text-[10px] px-2 py-0.5 rounded-full font-bold uppercase tracking-wider">Analysis Complete</span>
                <button id="uploadBtn" class="flex items-center gap-2 bg-primary text-white px-3 py-1.5 lg:px-4 lg:py-2 rounded-lg text-xs lg:text-sm font-bold shadow-lg shadow-primary/20 hover:bg-primary/90 transition-all">
                    <span class="material-symbols-outlined text-base">upload_file</span>
                    <span class="hidden sm:inline">Upload & Analyze</span>
                    <span class="sm:hidden">Upload</span>
                </button>
            </div>
        </header>

        <div class="flex-1 flex flex-col lg:flex-row overflow-hidden">
            
            <div class="flex-1 relative bg-slate-50 dark:bg-slate-950 p-4 lg:p-6 flex items-center justify-center overflow-auto custom-scrollbar">
                <div id="imageContainer" class="relative max-w-full shadow-2xl rounded-lg overflow-hidden group">
                    <img id="analyzedImage" alt="Analyzed Scene" class="w-full h-auto max-h-[70vh] lg:max-h-[80vh] object-contain block" src="https://via.placeholder.com/800x600?text=Select+Image+to+Begin">
                </div>
            </div>

            <div class="w-full lg:w-80 border-t lg:border-t-0 lg:border-l border-slate-200 dark:border-slate-800 bg-white dark:bg-slate-900 flex flex-col shrink-0 overflow-y-auto lg:overflow-hidden h-[40vh] lg:h-auto pb-16 lg:pb-0">
                <div class="p-4 lg:p-6 border-b border-slate-200 dark:border-slate-800 shrink-0 bg-white dark:bg-slate-900 sticky top-0 z-10">
                    <h3 class="text-xs font-bold text-slate-400 uppercase tracking-widest">Active Insight</h3>
                </div>
                
                <div class="flex-1 p-4 lg:p-6 space-y-6 lg:space-y-8 overflow-y-auto custom-scrollbar">
                    <div class="p-4 rounded-2xl bg-primary/5 border border-primary/20">
                        <div class="flex items-center gap-3 mb-4">
                            <div class="w-10 h-10 lg:w-12 lg:h-12 rounded-xl bg-primary flex items-center justify-center text-white shrink-0">
                                <span id="primaryIcon" class="material-symbols-outlined text-xl lg:text-2xl">psychology</span>
                            </div>
                            <div>
                                <h4 id="primaryLabel" class="font-bold text-base lg:text-lg leading-tight">Waiting</h4>
                                <span id="primaryCategory" class="text-[10px] lg:text-xs text-primary font-bold uppercase">Rekognition AI</span>
                            </div>
                        </div>
                        <div>
                            <div class="flex justify-between text-xs font-bold mb-1.5">
                                <span class="text-slate-500">Confidence</span>
                                <span id="confidenceText" class="text-primary">0%</span>
                            </div>
                            <div class="w-full bg-slate-100 dark:bg-slate-800 h-2 rounded-full overflow-hidden">
                                <div id="confidenceBar" class="bg-primary h-full transition-all duration-700" style="width: 0%"></div>
                            </div>
                        </div>
                    </div>

                    <div class="space-y-3">
                        <h5 class="text-xs font-bold text-slate-500 uppercase">Top Detectables</h5>
                        <div id="labelsList" class="space-y-2">
                            <p class="text-xs text-slate-400 italic">No analysis data yet.</p>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </main>

    <nav class="lg:hidden fixed bottom-0 left-0 right-0 h-16 border-t border-slate-200 dark:border-slate-800 bg-white dark:bg-slate-900 flex items-center justify-around px-6 z-40">
        <button class="flex flex-col items-center text-primary">
            <span class="material-symbols-outlined">dashboard</span>
            <span class="text-[10px] font-bold">Work</span>
        </button>
        <button class="flex flex-col items-center text-slate-400">
            <span class="material-symbols-outlined">history</span>
            <span class="text-[10px] font-bold">History</span>
        </button>
        <button class="flex flex-col items-center text-slate-400">
            <span class="material-symbols-outlined">settings</span>
            <span class="text-[10px] font-bold">Set</span>
        </button>
    </nav>

    <script src="script.js"></script>
</body>
</html>
